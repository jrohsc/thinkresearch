<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ThinkResearch</title>
    <script>
      // Redirect to index.html with the path as a query parameter
      // This allows the SPA router to handle the route
      const path = window.location.pathname;
      window.location.replace('/thinkresearch/' + '?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
